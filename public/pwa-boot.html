<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1020" />
    <title>Kifpadel</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0b1020;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, sans-serif;
        gap: 1.25rem;
        padding: 1.5rem;
      }
      .logo {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        background: #141a2e;
        border: 1px solid rgba(212, 175, 55, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 0.7rem;
        color: #d4af37;
        letter-spacing: 0.2em;
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        border: 3px solid rgba(212, 175, 55, 0.2);
        border-top-color: #d4af37;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        margin: 0;
        font-size: 0.875rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="logo">KIF</div>
    <div class="spinner" aria-hidden="true"></div>
    <p id="msg">Chargement…</p>
    <button id="retry" type="button" hidden style="margin-top:0.5rem;padding:0.5rem 1rem;border-radius:0.75rem;border:1px solid rgba(212,175,55,0.4);background:#141a2e;color:#d4af37;font-weight:700;cursor:pointer">
      Réessayer
    </button>
    <script>
      (function () {
        var target = "/fr";
        var attempts = 0;
        var maxAttempts = 12;
        var msg = document.getElementById("msg");
        var retryBtn = document.getElementById("retry");
        try {
          var seg = location.pathname.split("/").filter(Boolean)[0];
          if (seg === "en" || seg === "fr") target = "/" + seg;
        } catch (e) {}

        function tryLoad() {
          attempts += 1;
          if (attempts > maxAttempts) {
            msg.textContent = "Connexion lente. Touchez Réessayer ou rechargez la page.";
            retryBtn.hidden = false;
            return;
          }

          fetch(target, {
            credentials: "same-origin",
            cache: "no-store",
            headers: { "X-Kifpadel-Boot-Retry": "1" },
          })
            .then(function (r) {
              if (r.ok) {
                location.replace(target);
                return;
              }
              setTimeout(tryLoad, 2000);
            })
            .catch(function () {
              setTimeout(tryLoad, 2000);
            });
        }

        retryBtn.addEventListener("click", function () {
          attempts = 0;
          retryBtn.hidden = true;
          msg.textContent = "Chargement…";
          tryLoad();
        });

        tryLoad();
      })();
    </script>
  </body>
</html>
